<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 300px; background: #0d0c0b; font-family: 'Menlo', 'Monaco', ui-monospace, monospace; color: #ECEBDE; padding: 16px; border: 1px solid #1a1917; }
    .titlebar { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid #1a1917; padding-bottom: 10px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .path { font-size: 11px; color: #a19d96; }
    .btn { display: block; width: 100%; background: transparent; border: 1px solid #2a2926; color: #a19d96; padding: 12px; margin-bottom: 8px; text-align: left; cursor: pointer; transition: all 0.2s; font-family: inherit; font-size: 12px; border-radius: 4px; }
    .btn:hover:not(:disabled) { border-color: #4a8cd4; color: #4a8cd4; background: rgba(74, 140, 212, 0.05); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #loader { display: none; font-size: 10px; color: #4a8cd4; margin-top: 10px; text-align: center; }
    .loader-pulse { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body>
  <div class="titlebar">
    <div class="dot" style="background:#ED655A"></div><div class="dot" style="background:#E1C04C"></div><div class="dot" style="background:#72BE47"></div>
    <span class="path">~/gemini-typingflow</span>
  </div>
  
  <button id="btn-extract" class="btn">> execute llm_enrichment()</button>
  <button id="btn-type" class="btn" disabled>> launch active_recall_ui()</button>
  
  <div id="loader" class="loader-pulse">Wait: processing...</div>
  
  <script src="popup.js"></script>
</body>
</html>
