<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
        width: 320px; 
        background: radial-gradient(120% 120% at 50% -20%, #1e1b4b 0%, #030712 100%);
        font-family: 'Inter', system-ui, -apple-system, sans-serif; 
        color: #f3f4f6; 
        padding: 24px; 
        border: 1px solid #1f2937; 
    }
    
    .header { text-align: center; margin-bottom: 24px; }
    .header-icon { 
        font-size: 36px; 
        margin-bottom: 8px; 
        background: linear-gradient(135deg, #60a5fa, #c084fc, #f472b6); 
        -webkit-background-clip: text; 
        -webkit-text-fill-color: transparent; 
        display: inline-block;
        filter: drop-shadow(0 4px 12px rgba(192, 132, 252, 0.4));
    }
    .header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 4px; }
    .header p { font-size: 13px; color: #9ca3af; font-weight: 400; }
    
    .btn { 
        display: flex; align-items: center; justify-content: center; width: 100%; 
        background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.08); 
        color: #f3f4f6; padding: 14px; margin-bottom: 12px; cursor: pointer; 
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-family: inherit; 
        font-size: 14px; font-weight: 500; border-radius: 12px; 
        backdrop-filter: blur(8px); 
    }
    .btn:hover:not(:disabled) { 
        background: rgba(192, 132, 252, 0.1); 
        border-color: #c084fc; 
        transform: translateY(-1px); 
        box-shadow: 0 4px 16px rgba(192, 132, 252, 0.15); 
    }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    
    .btn-primary { 
        background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); 
        border: none; color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2); 
    }
    .btn-primary:hover:not(:disabled) { 
        background: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%); 
        box-shadow: 0 6px 20px rgba(139, 92, 246, 0.35); 
        border-color: transparent;
    }

    #loader { 
        display: none; margin-top: 16px; padding: 14px; border-radius: 10px; 
        background: rgba(15, 23, 42, 0.6); font-size: 12px; color: #a78bfa; 
        text-align: center; border: 1px solid rgba(139, 92, 246, 0.2); 
        font-weight: 500; letter-spacing: 0.3px; backdrop-filter: blur(4px);
    }
    .loader-pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.9; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">✦</div>
    <h1>Gemini TypingFlow</h1>
    <p>AI-Powered Active Recall</p>
  </div>
  
  <button id="btn-extract" class="btn btn-primary">Process Page Intelligence</button>
  <button id="btn-type" class="btn" disabled>Launch Typing Session</button>
  
  <div id="loader" class="loader-pulse">Initializing engine...</div>
  
  <script src="popup.js"></script>
</body>
</html>
